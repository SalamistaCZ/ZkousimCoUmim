<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testovací web — Kontakt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-kontakt">

  <header>
    <div class="logo">Testovací Web</div>
    <nav>
      <ul>
        <li><a href="index.html">Domů</a></li>
        <li><a href="galerie.html">Galerie</a></li>
        <li><a href="obsah.html">Obsah</a></li>
        <li><a href="kontakt.html" class="active">Kontakt</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Kontakt</h1>
    <p>
      Ukázkový formulář, který nikam nic neumí posílat. Jen do řiti.
      Zkus to.
    </p>

    <form onsubmit="return false;">
      <div>
        <label for="jmeno">Jméno</label><br>
        <input type="text" id="jmeno" name="jmeno" placeholder="Tvoje jméno">
      </div>
      <div>
        <label for="email">E-mail</label><br>
        <input type="email" id="email" name="email" placeholder="tvuj@email.cz">
      </div>
      <div>
        <label for="zprava">Zpráva</label><br>
        <textarea id="zprava" name="zprava" rows="5" placeholder="Napiš zprávu..."></textarea>
      </div>
      <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
        <button type="submit" class="btn">Odeslat</button>
        <button type="button" id="btn-poslat" class="btn" style="margin-left:0.5rem;">Nechat se poslat někam</button>
      </div>
      <p id="poslat-vysledek" style="display:none; color:var(--red-glow); font-weight:bold;">
        Tento formulář tě poslal do řiti.
      </p>
    </form>
  </main>

  <footer>
    &copy; 2026 Testovací Web — vytvořeno v záchvatu nadšení, provozován v hlubokém pocitu bezmoci.
  </footer>

  <script>
    document.getElementById('btn-poslat').addEventListener('click', function () {
      document.getElementById('poslat-vysledek').style.display = 'block';
    });
  </script>

</body>
</html>
