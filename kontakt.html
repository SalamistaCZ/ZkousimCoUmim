<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testovací web — Kontakt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">Testovací Web</div>
    <nav>
      <ul>
        <li><a href="index.html">Domů</a></li>
        <li><a href="galerie.html">Galerie</a></li>
        <li><a href="obsah.html">Obsah</a></li>
        <li><a href="kontakt.html" class="active">Kontakt</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Kontakt</h1>
    <p>
      Ukázkový kontaktní formulář. Pozor: bez propojení na backend/e-mailovou
      službu formulář zatím nikam neodesílá — je tu jen pro trénink vzhledu a úprav.
    </p>

    <form>
      <div>
        <label for="jmeno">Jméno</label><br>
        <input type="text" id="jmeno" name="jmeno" placeholder="Tvoje jméno">
      </div>
      <div>
        <label for="email">E-mail</label><br>
        <input type="email" id="email" name="email" placeholder="tvuj@email.cz">
      </div>
      <div>
        <label for="zprava">Zpráva</label><br>
        <textarea id="zprava" name="zprava" rows="5" placeholder="Napiš zprávu..."></textarea>
      </div>
      <button type="submit" class="btn">Odeslat</button>
    </form>
  </main>

  <footer>
    &copy; 2026 Testovací Web — vytvořeno pro tréninkové účely.
  </footer>

</body>
</html>
